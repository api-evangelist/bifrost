aid: bifrost
name: Bifrost
description: >-
  Bifrost is a high-performance open-source AI gateway that unifies access to
  20+ AI providers through a single OpenAI-compatible API. It supports 1,000+
  models with adaptive load balancing, automatic failover, semantic caching,
  and enterprise observability features. Bifrost is open-source under Apache 2.0.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI Gateway
  - LLM
  - Load Balancing
  - Open Source
  - OpenAI Compatible
  - MCP
url: https://raw.githubusercontent.com/api-evangelist/bifrost/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: bifrost:bifrost-http-gateway-api
    name: Bifrost HTTP Gateway API
    description: >-
      The Bifrost HTTP Gateway API provides an OpenAI-compatible RESTful
      interface that routes requests to any of 20+ supported AI providers.
      Requests specify the provider and model using provider/model-name in the
      model field, enabling seamless provider switching without client code changes.
    humanURL: https://docs.getbifrost.ai/quickstart/gateway/setting-up
    baseURL: http://localhost:8080
    tags:
      - AI Gateway
      - LLM
      - OpenAI Compatible
      - REST
    properties:
      - type: Documentation
        url: https://docs.getbifrost.ai/quickstart/gateway/setting-up
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/bifrost/refs/heads/main/openapi/bifrost-http-gateway-api.yaml
  - aid: bifrost:bifrost-go-sdk
    name: Bifrost Go SDK
    description: >-
      The Bifrost Go SDK provides a native Go client for embedding the Bifrost
      AI gateway directly into Go applications using the github.com/maximhq/bifrost/core
      package.
    humanURL: https://docs.getbifrost.ai/quickstart/go-sdk/setting-up
    baseURL: https://pkg.go.dev/github.com/maximhq/bifrost/core
    tags:
      - AI Gateway
      - Go
      - LLM
      - SDK
    properties:
      - type: Documentation
        url: https://docs.getbifrost.ai/quickstart/go-sdk/setting-up
      - type: GettingStarted
        url: https://docs.getbifrost.ai/quickstart/go-sdk/setting-up
      - type: GitHubRepository
        url: https://github.com/maximhq/bifrost
  - aid: bifrost:bifrost-mcp-gateway
    name: Bifrost MCP Gateway
    description: >-
      The Bifrost Model Context Protocol (MCP) Gateway enables AI agents to
      discover and execute external tools through a standardized protocol,
      with OAuth 2.0 authentication and tool approval controls.
    humanURL: https://docs.getbifrost.ai/features/mcp
    tags:
      - AI Agents
      - MCP
      - OAuth
      - Tool Execution
    properties:
      - type: Documentation
        url: https://docs.getbifrost.ai/features/mcp
      - type: GitHubRepository
        url: https://github.com/maximhq/bifrost
